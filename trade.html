<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade - SummitFX</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0b1220;
            --bg-secondary: #111827;
            --bg-card: #1e293b;
            --border-color: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-gold: #f5a623;
            --accent-gold-hover: #d48b17;
            --buy-color: #10b981;
            --sell-color: #ef4444;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-primary); display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            position: fixed; height: 100vh;
            display: flex; flex-direction: column;
            padding: 24px 0; z-index: 100;
            transition: transform 0.3s ease;
        }
        .logo { padding: 0 24px 32px; font-size: 24px; font-weight: 800; border-bottom: 1px solid var(--border-color); margin-bottom: 24px; }
        .logo span { color: var(--accent-gold); }
        .nav-menu { flex: 1; padding: 0 16px; overflow-y: auto; }
        .nav-item {
            display: flex; align-items: center; gap: 16px;
            padding: 14px 16px; color: var(--text-secondary);
            text-decoration: none; border-radius: 8px;
            margin-bottom: 8px; transition: all 0.2s; font-weight: 500;
        }
        .nav-item:hover, .nav-item.active { background-color: rgba(245, 166, 35, 0.1); color: var(--accent-gold); }
        .nav-item.active { border-left: 3px solid var(--accent-gold); }
        .nav-item i { width: 20px; text-align: center; font-size: 18px; }
        .logout-btn {
            margin: 0 16px; padding: 14px;
            background: transparent; border: 1px solid var(--border-color);
            color: var(--text-secondary); border-radius: 8px;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
            gap: 10px; font-weight: 600;
        }
        .logout-btn:hover { border-color: var(--sell-color); color: var(--sell-color); }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1; padding: 0;
            width: calc(100% - var(--sidebar-width));
            display: flex; flex-direction: column;
        }

        /* Top Bar */
        .top-bar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 32px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .pair-info { display: flex; align-items: center; gap: 16px; }
        .pair-name { font-size: 24px; font-weight: 800; color: var(--text-primary); }
        .pair-spread { font-size: 13px; color: var(--text-secondary); background: var(--bg-secondary); padding: 4px 12px; border-radius: 50px; }
        .account-info { display: flex; align-items: center; gap: 24px; }
        .balance-item { text-align: right; }
        .balance-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 2px; }
        .balance-value { font-size: 20px; font-weight: 700; color: var(--accent-gold); }

        /* Trading Container */
        .trading-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Chart Section */
        .chart-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
        }

        .chart-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 24px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .timeframes { display: flex; gap: 8px; }
        .tf-btn {
            padding: 6px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .tf-btn:hover, .tf-btn.active { background: var(--accent-gold); color: var(--bg-primary); border-color: var(--accent-gold); }
        .chart-type { display: flex; gap: 8px; }
        .type-btn {
            width: 36px; height: 36px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .type-btn:hover, .type-btn.active { background: var(--accent-gold); color: var(--bg-primary); border-color: var(--accent-gold); }

        #chart-container {
            flex: 1;
            position: relative;
        }

        /* Trading Panel */
        .trading-panel {
            width: 380px;
            background: var(--bg-card);
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border-color);
        }

        .panel-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
        }
        .panel-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
        
        .price-display {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .price-box {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }
        .price-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
        .price-value { font-size: 28px; font-weight: 800; font-family: 'Courier New', monospace; }
        .price-box.sell .price-value { color: var(--sell-color); }
        .price-box.buy .price-value { color: var(--buy-color); }

        .lot-selector {
            margin-bottom: 20px;
        }
        .lot-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 600; }
        .lot-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 4px;
        }
        .lot-btn {
            width: 40px; height: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            transition: all 0.2s;
        }
        .lot-btn:hover { background: var(--accent-gold); color: var(--bg-primary); border-color: var(--accent-gold); }
        .lot-input {
            flex: 1;
            background: transparent;
            border: none;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'Courier New', monospace;
        }
        .lot-input:focus { outline: none; }

        .sl-tp-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-label { font-size: 12px; color: var(--text-secondary); font-weight: 600; }
        .input-field {
            padding: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Courier New', monospace;
        }
        .input-field:focus { outline: none; border-color: var(--accent-gold); }

        .trade-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .trade-btn {
            padding: 18px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .trade-btn.sell {
            background: var(--sell-color);
            color: white;
        }
        .trade-btn.buy {
            background: var(--buy-color);
            color: white;
        }
        .trade-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .trade-btn:active { transform: translateY(0); }
        .btn-label { font-size: 12px; opacity: 0.9; }
        .btn-price { font-size: 20px; font-family: 'Courier New', monospace; }

        /* Positions Section */
        .positions-section {
            flex: 1;
            overflow-y: auto;
            border-top: 1px solid var(--border-color);
        }
        .positions-header {
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .position-item {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .position-info h4 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
        .position-info p { font-size: 12px; color: var(--text-secondary); }
        .position-pnl { text-align: right; }
        .pnl-value { font-size: 18px; font-weight: 700; font-family: 'Courier New', monospace; }
        .pnl-value.profit { color: var(--buy-color); }
        .pnl-value.loss { color: var(--sell-color); }
        .close-btn {
            margin-top: 8px;
            padding: 6px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .close-btn:hover { background: var(--sell-color); color: white; border-color: var(--sell-color); }

        .empty-positions {
            padding: 40px 24px;
            text-align: center;
            color: var(--text-secondary);
        }
        .empty-positions i { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }

        /* Mobile Menu Toggle */
        .mobile-menu-toggle {
            display: none;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 42px; height: 42px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 32px; right: 32px;
            background: var(--success);
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { background: var(--sell-color); }

        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; width: 100%; }
            .trading-panel { position: fixed; right: -380px; top: 0; height: 100vh; z-index: 200; transition: right 0.3s ease; }
            .trading-panel.open { right: 0; }
            .mobile-menu-toggle { display: flex; align-items: center; justify-content: center; }
        }
        @media (max-width: 768px) {
            .trading-panel { width: 100%; right: -100%; }
            .price-value { font-size: 20px; }
            .trade-btn { padding: 14px; }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="logo">Summit<span>FX</span></div>
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="trade.html" class="nav-item active"><i class="fas fa-exchange-alt"></i> Trade</a>
            <a href="deposit.html" class="nav-item"><i class="fas fa-arrow-down"></i> Deposit</a>
            <a href="withdraw.html" class="nav-item"><i class="fas fa-arrow-up"></i> Withdraw</a>
            <a href="transactions.html" class="nav-item"><i class="fas fa-history"></i> Transactions</a>
            <a href="profile.html" class="nav-item"><i class="fas fa-user-cog"></i> Profile</a>
        </nav>
        <button class="logout-btn" onclick="handleLogout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Bar -->
        <div class="top-bar">
            <div style="display: flex; align-items: center; gap: 16px;">
                <button class="mobile-menu-toggle" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="pair-info">
                    <div class="pair-name">XAUUSD</div>
                    <div class="pair-spread">Spread: 0.24</div>
                </div>
            </div>
            <div class="account-info">
                <div class="balance-item">
                    <div class="balance-label">Balance</div>
                    <div class="balance-value" id="account-balance">$0.00</div>
                </div>
                <button class="mobile-menu-toggle" onclick="toggleTradingPanel()" style="margin-left: 16px;">
                    <i class="fas fa-layer-group"></i>
                </button>
            </div>
        </div>

        <!-- Trading Container -->
        <div class="trading-container">
            <!-- Chart Section -->
            <div class="chart-section">
                <div class="chart-header">
                    <div class="timeframes">
                        <button class="tf-btn">M1</button>
                        <button class="tf-btn active">M5</button>
                        <button class="tf-btn">M15</button>
                        <button class="tf-btn">H1</button>
                        <button class="tf-btn">H4</button>
                        <button class="tf-btn">D1</button>
                    </div>
                    <div class="chart-type">
                        <button class="type-btn active"><i class="fas fa-chart-bar"></i></button>
                        <button class="type-btn"><i class="fas fa-chart-line"></i></button>
                    </div>
                </div>
                <div id="chart-container"></div>
            </div>

            <!-- Trading Panel -->
            <div class="trading-panel" id="trading-panel">
                <div class="panel-header">
                    <div class="panel-title">New Order</div>
                    <div class="price-display">
                        <div class="price-box sell">
                            <div class="price-label">SELL</div>
                            <div class="price-value" id="sell-price">4178.34</div>
                        </div>
                        <div class="price-box buy">
                            <div class="price-label">BUY</div>
                            <div class="price-value" id="buy-price">4178.58</div>
                        </div>
                    </div>
                </div>

                <div style="padding: 0 24px; flex: 1; overflow-y: auto;">
                    <div class="lot-selector">
                        <div class="lot-label">Lot Size</div>
                        <div class="lot-controls">
                            <button class="lot-btn" onclick="changeLot(-0.01)">-</button>
                            <input type="number" class="lot-input" id="lot-size" value="0.10" step="0.01" min="0.01" max="100">
                            <button class="lot-btn" onclick="changeLot(0.01)">+</button>
                        </div>
                    </div>

                    <div class="sl-tp-inputs">
                        <div class="input-group">
                            <label class="input-label">Stop Loss</label>
                            <input type="number" class="input-field" id="stop-loss" placeholder="0.00" step="0.01">
                        </div>
                        <div class="input-group">
                            <label class="input-label">Take Profit</label>
                            <input type="number" class="input-field" id="take-profit" placeholder="0.00" step="0.01">
                        </div>
                    </div>

                    <div class="trade-buttons">
                        <button class="trade-btn sell" onclick="openTrade('sell')">
                            <span class="btn-label">SELL</span>
                            <span class="btn-price" id="btn-sell-price">4178.34</span>
                        </button>
                        <button class="trade-btn buy" onclick="openTrade('buy')">
                            <span class="btn-label">BUY</span>
                            <span class="btn-price" id="btn-buy-price">4178.58</span>
                        </button>
                    </div>
                </div>

                <!-- Open Positions -->
                <div class="positions-section">
                    <div class="positions-header">
                        <span>Open Positions</span>
                        <span id="positions-count" style="color: var(--text-secondary); font-size: 13px;">0</span>
                    </div>
                    <div id="positions-list">
                        <div class="empty-positions">
                            <i class="fas fa-inbox"></i>
                            <p>No open positions</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toast-msg">Trade executed successfully!</span>
    </div>

    <script>
        // --- SUPABASE CONFIG ---
        const SUPABASE_URL = 'https://mybymdcjytslxihbgqnh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15YnltZGNqeXRzbHhpaGJncW5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzOTYzMjMsImV4cCI6MjA5NTk3MjMyM30.5VBuL938TWC0cijFPPVdd1pG7_A1dFioQ5Bhv6SnLhs';
        let supabaseClient;
        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch (e) {
            console.warn("Supabase failed to load.");
        }

        let currentUserId = null;
        let userBalance = 0;
        let positions = [];
        let currentPrice = 4178.46;
        let sellPrice = 4178.34;
        let buyPrice = 4178.58;

        // --- CHART SETUP ---
        const chartContainer = document.getElementById('chart-container');
        const chart = LightweightCharts.createChart(chartContainer, {
            layout: {
                background: { type: 'solid', color: '#0b1220' },
                textColor: '#94a3b8',
            },
            grid: {
                vertLines: { color: '#1e293b' },
                horzLines: { color: '#1e293b' },
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
                vertLine: { color: '#f5a623', labelBackgroundColor: '#f5a623' },
                horzLine: { color: '#f5a623', labelBackgroundColor: '#f5a623' },
            },
            rightPriceScale: {
                borderColor: '#334155',
            },
            timeScale: {
                borderColor: '#334155',
                timeVisible: true,
                secondsVisible: false,
            },
        });

        const candleSeries = chart.addCandlestickSeries({
            upColor: '#10b981',
            downColor: '#ef4444',
            borderDownColor: '#ef4444',
            borderUpColor: '#10b981',
            wickDownColor: '#ef4444',
            wickUpColor: '#10b981',
        });

        // Generate sample candlestick data
        function generateCandleData() {
            const data = [];
            let time = new Date(Date.now() - 100 * 24 * 60 * 60 * 1000);
            let price = 4150;
            
            for (let i = 0; i < 100; i++) {
                const open = price + (Math.random() - 0.5) * 10;
                const close = open + (Math.random() - 0.5) * 15;
                const high = Math.max(open, close) + Math.random() * 5;
                const low = Math.min(open, close) - Math.random() * 5;
                
                data.push({
                    time: time.toISOString().split('T')[0],
                    open: parseFloat(open.toFixed(2)),
                    high: parseFloat(high.toFixed(2)),
                    low: parseFloat(low.toFixed(2)),
                    close: parseFloat(close.toFixed(2)),
                });
                
                price = close;
                time.setDate(time.getDate() + 1);
            }
            return data;
        }

        candleSeries.setData(generateCandleData());

        // Resize chart on window resize
        window.addEventListener('resize', () => {
            chart.applyOptions({ 
                width: chartContainer.clientWidth, 
                height: chartContainer.clientHeight 
            });
        });

        // --- TRADING FUNCTIONS ---
        function changeLot(amount) {
            const input = document.getElementById('lot-size');
            let newValue = parseFloat(input.value) + amount;
            if (newValue < 0.01) newValue = 0.01;
            if (newValue > 100) newValue = 100;
            input.value = newValue.toFixed(2);
        }

        function updatePrices() {
            // Simulate price movement
            const change = (Math.random() - 0.5) * 0.5;
            currentPrice += change;
            sellPrice = currentPrice - 0.12;
            buyPrice = currentPrice + 0.12;

            document.getElementById('sell-price').textContent = sellPrice.toFixed(2);
            document.getElementById('buy-price').textContent = buyPrice.toFixed(2);
            document.getElementById('btn-sell-price').textContent = sellPrice.toFixed(2);
            document.getElementById('btn-buy-price').textContent = buyPrice.toFixed(2);

            // Update last candle
            const lastCandle = {
                time: new Date().toISOString().split('T')[0],
                open: currentPrice - 0.1,
                high: currentPrice + 0.2,
                low: currentPrice - 0.3,
                close: currentPrice,
            };
            candleSeries.update(lastCandle);
        }

        // Update prices every second
        setInterval(updatePrices, 1000);

        async function openTrade(type) {
            if (!currentUserId) {
                showToast('Please log in to trade', true);
                return;
            }

            const lotSize = parseFloat(document.getElementById('lot-size').value);
            const stopLoss = document.getElementById('stop-loss').value;
            const takeProfit = document.getElementById('take-profit').value;
            const price = type === 'buy' ? buyPrice : sellPrice;

            const tradeData = {
                user_id: currentUserId,
                type: type,
                symbol: 'XAUUSD',
                lot_size: lotSize,
                open_price: price,
                stop_loss: stopLoss ? parseFloat(stopLoss) : null,
                take_profit: takeProfit ? parseFloat(takeProfit) : null,
                status: 'open',
                opened_at: new Date().toISOString(),
            };

            try {
                const { data, error } = await supabaseClient
                    .from('trades')
                    .insert([tradeData])
                    .select();

                if (error) throw error;

                positions.push(data[0]);
                renderPositions();
                showToast(`${type.toUpperCase()} order opened successfully!`);
                
                // Clear SL/TP inputs
                document.getElementById('stop-loss').value = '';
                document.getElementById('take-profit').value = '';
                
            } catch (error) {
                console.error('Trade error:', error);
                showToast('Failed to open trade. Please try again.', true);
            }
        }

        async function closePosition(positionId, index) {
            try {
                const { error } = await supabaseClient
                    .from('trades')
                    .update({ status: 'closed', closed_at: new Date().toISOString() })
                    .eq('id', positionId);

                if (error) throw error;

                positions.splice(index, 1);
                renderPositions();
                showToast('Position closed successfully!');
                
            } catch (error) {
                console.error('Close error:', error);
                showToast('Failed to close position.', true);
            }
        }

        function renderPositions() {
            const container = document.getElementById('positions-list');
            const countEl = document.getElementById('positions-count');
            
            countEl.textContent = positions.length;

            if (positions.length === 0) {
                container.innerHTML = `
                    <div class="empty-positions">
                        <i class="fas fa-inbox"></i>
                        <p>No open positions</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = positions.map((pos, index) => {
                const pnl = ((Math.random() - 0.5) * 100 * pos.lot_size).toFixed(2);
                const pnlClass = pnl >= 0 ? 'profit' : 'loss';
                const pnlSign = pnl >= 0 ? '+' : '';
                
                return `
                    <div class="position-item">
                        <div class="position-info">
                            <h4>${pos.type.toUpperCase()} XAUUSD</h4>
                            <p>Lot: ${pos.lot_size} | Open: ${pos.open_price}</p>
                        </div>
                        <div class="position-pnl">
                            <div class="pnl-value ${pnlClass}">${pnlSign}$${pnl}</div>
                            <button class="close-btn" onclick="closePosition('${pos.id}', ${index})">Close</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- AUTH & UI ---
        async function checkAuth() {
            try {
                if (!supabaseClient) return;
                
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (!session) {
                    // window.location.href = 'index.html';
                    return;
                }

                currentUserId = session.user.id;
                
                // Fetch user balance
                const { data: profile } = await supabaseClient
                    .from('profiles')
                    .select('balance')
                    .eq('id', currentUserId)
                    .single();
                
                if (profile) {
                    userBalance = parseFloat(profile.balance) || 0;
                    document.getElementById('account-balance').textContent = '$' + userBalance.toLocaleString('en-US', {minimumFractionDigits: 2});
                }

                // Fetch open positions
                const { data: openPositions } = await supabaseClient
                    .from('trades')
                    .select('*')
                    .eq('user_id', currentUserId)
                    .eq('status', 'open');
                
                if (openPositions) {
                    positions = openPositions;
                    renderPositions();
                }

            } catch (error) {
                console.error("Auth error:", error);
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function toggleTradingPanel() {
            document.getElementById('trading-panel').classList.toggle('open');
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toast-msg');
            msgEl.textContent = message;
            
            if (isError) {
                toast.classList.add('error');
                toast.querySelector('i').className = 'fas fa-exclamation-circle';
            } else {
                toast.classList.remove('error');
                toast.querySelector('i').className = 'fas fa-check-circle';
            }

            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        async function handleLogout() {
            if (supabaseClient) {
                await supabaseClient.auth.signOut();
            }
            window.location.href = 'index.html';
        }

        // Initialize
        checkAuth();

        // Simulate PnL updates
        setInterval(() => {
            if (positions.length > 0) {
                renderPositions();
            }
        }, 3000);
    </script>
</body>
</html>
