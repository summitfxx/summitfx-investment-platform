<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Trading - SummitFX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000;
        }
        .mt5-card { 
            background: #1e222d; 
            border: 1px solid #2a2e39;
        }
        .buy-btn { background: #26a69a; }
        .sell-btn { background: #ef5350; }
        .grid-line { stroke: #2a2e39; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1e222d; }
        ::-webkit-scrollbar-thumb { background: #363a45; border-radius: 3px; }
        
        .sidebar {
            width: 260px;
            background-color: #111827;
            border-right: 1px solid #334155;
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 24px 0;
            z-index: 100;
            transition: transform 0.3s ease;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 24px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .nav-item:hover, .nav-item.active {
            background-color: rgba(245, 166, 35, 0.1);
            color: #f5a623;
        }
        
        .nav-item.active {
            border-left: 3px solid #f5a623;
        }
        
        .main-content {
            margin-left: 260px;
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body class="text-white h-screen overflow-hidden flex">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="logo px-6 pb-8 border-b border-slate-700 mb-6">
            <h1 class="text-2xl font-bold">Summit<span class="text-amber-500">FX</span></h1>
        </div>
        <nav class="nav-menu flex-1 px-4 overflow-y-auto">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-chart-line w-5 text-center"></i>
                <span>Dashboard</span>
            </a>
            <a href="trade.html" class="nav-item active">
                <i class="fas fa-exchange-alt w-5 text-center"></i>
                <span>Trade</span>
            </a>
            <a href="deposit.html" class="nav-item">
                <i class="fas fa-arrow-down w-5 text-center"></i>
                <span>Deposit</span>
            </a>
            <a href="withdraw.html" class="nav-item">
                <i class="fas fa-arrow-up w-5 text-center"></i>
                <span>Withdraw</span>
            </a>
            <a href="transactions.html" class="nav-item">
                <i class="fas fa-history w-5 text-center"></i>
                <span>Transactions</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i class="fas fa-user-cog w-5 text-center"></i>
                <span>Profile</span>
            </a>
        </nav>
        <button onclick="handleLogout()" class="mx-4 mb-4 px-4 py-3 border border-slate-600 rounded-lg text-slate-400 hover:text-red-500 hover:border-red-500 transition-all flex items-center justify-center gap-2">
            <i class="fas fa-sign-out-alt"></i>
            <span>Logout</span>
        </button>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Bar -->
        <div class="mt5-card border-b border-slate-700 px-3 py-2 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="md:hidden p-2 hover:bg-slate-700 rounded">
                    <i class="fas fa-bars w-5"></i>
                </button>
                <div class="flex items-center gap-2 bg-slate-800 rounded px-3 py-1.5">
                    <span class="font-bold text-sm" id="symbol">XAUUSD</span>
                    <i class="fas fa-chevron-down w-3 h-3 text-slate-400"></i>
                </div>
                <div class="hidden sm:flex items-center gap-1 bg-slate-800 rounded px-2 py-1">
                    <button class="px-2 py-1 text-xs hover:bg-slate-700 rounded">M1</button>
                    <button class="px-2 py-1 text-xs hover:bg-slate-700 rounded">M5</button>
                    <button class="px-2 py-1 text-xs bg-blue-600 rounded">M15</button>
                    <button class="px-2 py-1 text-xs hover:bg-slate-700 rounded">H1</button>
                    <button class="px-2 py-1 text-xs hover:bg-slate-700 rounded">H4</button>
                    <button class="px-2 py-1 text-xs hover:bg-slate-700 rounded">D1</button>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <div class="hidden md:flex items-center gap-4 mr-4">
                    <div class="text-right">
                        <p class="text-xs text-slate-400">Balance</p>
                        <p class="font-bold text-amber-500">$<span id="account-balance">0.00</span></p>
                    </div>
                </div>
                <button class="p-2 hover:bg-slate-700 rounded">
                    <i class="fas fa-clock w-5"></i>
                </button>
                <button class="p-2 hover:bg-slate-700 rounded">
                    <i class="fas fa-chart-bar w-5"></i>
                </button>
            </div>
        </div>

        <!-- Price Header -->
        <div class="bg-slate-900 border-b border-slate-700 px-3 py-2">
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-4">
                    <div>
                        <p class="text-xs text-slate-400">SELL</p>
                        <p class="text-xl font-bold text-red-500" id="sellPrice">4178.34</p>
                    </div>
                    <div class="text-slate-600">|</div>
                    <div>
                        <p class="text-xs text-slate-400">BUY</p>
                        <p class="text-xl font-bold text-green-500" id="buyPrice">4178.58</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="setLot(0.1)" class="px-3 py-1 text-xs bg-slate-800 rounded hover:bg-slate-700">0.1</button>
                    <button onclick="setLot(0.3)" class="px-3 py-1 text-xs bg-slate-800 rounded hover:bg-slate-700">0.3</button>
                    <button onclick="setLot(0.5)" class="px-3 py-1 text-xs bg-blue-600 rounded">0.5</button>
                    <button onclick="setLot(1.0)" class="px-3 py-1 text-xs bg-slate-800 rounded hover:bg-slate-700">1.0</button>
                </div>
            </div>
        </div>

        <!-- Chart Container -->
        <div class="flex-1 relative">
            <div id="tradingview_chart" class="w-full h-full"></div>
            
            <!-- Current Price Label -->
            <div class="absolute right-0 top-1/2 transform -translate-y-1/2 bg-green-600 text-white text-xs px-2 py-1 rounded-l">
                <div id="currentPrice">4178.46</div>
                <div class="text-[10px] text-green-200" id="priceTime">00:00</div>
            </div>
        </div>

        <!-- Trading Panel -->
        <div class="mt5-card border-t border-slate-700 p-3">
            <div class="grid grid-cols-2 gap-3 mb-3">
                <button onclick="openTrade('SELL')" class="sell-btn hover:bg-red-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-all">
                    <i class="fas fa-arrow-down w-6 h-6"></i>
                    <div class="text-left">
                        <div class="text-xs opacity-80">SELL</div>
                        <div class="text-lg" id="sellBtnPrice">4178.34</div>
                    </div>
                </button>
                
                <button onclick="openTrade('BUY')" class="buy-btn hover:bg-green-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-all">
                    <div class="text-right">
                        <div class="text-xs opacity-80">BUY</div>
                        <div class="text-lg" id="buyBtnPrice">4178.58</div>
                    </div>
                    <i class="fas fa-arrow-up w-6 h-6"></i>
                </button>
            </div>
            
            <!-- Trade Info -->
            <div class="grid grid-cols-3 gap-3 text-xs">
                <div class="bg-slate-800 rounded-lg p-2">
                    <p class="text-slate-400 mb-1">Spread</p>
                    <p class="font-semibold" id="spread">0.24</p>
                </div>
                <div class="bg-slate-800 rounded-lg p-2">
                    <p class="text-slate-400 mb-1">Margin</p>
                    <p class="font-semibold">$<span id="margin">0.00</span></p>
                </div>
                <div class="bg-slate-800 rounded-lg p-2">
                    <p class="text-slate-400 mb-1">Balance</p>
                    <p class="font-semibold">$<span id="balance">0.00</span></p>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="mt5-card border-t border-slate-700 px-2 py-2">
            <div class="flex items-center justify-around">
                <a href="dashboard.html" class="flex flex-col items-center gap-1 p-2 text-slate-400 hover:text-white">
                    <i class="fas fa-chart-line w-6 h-6"></i>
                    <span class="text-[10px]">Quotes</span>
                </a>
                <a href="trade.html" class="flex flex-col items-center gap-1 p-2 text-blue-500 bg-blue-500/10 rounded-lg">
                    <i class="fas fa-exchange-alt w-6 h-6"></i>
                    <span class="text-[10px]">Charts</span>
                </a>
                <a href="deposit.html" class="flex flex-col items-center gap-1 p-2 text-slate-400 hover:text-white">
                    <i class="fas fa-arrow-down w-6 h-6"></i>
                    <span class="text-[10px]">Trade</span>
                </a>
                <a href="withdraw.html" class="flex flex-col items-center gap-1 p-2 text-slate-400 hover:text-white">
                    <i class="fas fa-clock w-6 h-6"></i>
                    <span class="text-[10px]">History</span>
                </a>
                <a href="profile.html" class="flex flex-col items-center gap-1 p-2 text-slate-400 hover:text-white">
                    <i class="fas fa-comment w-6 h-6"></i>
                    <span class="text-[10px]">Messages</span>
                </a>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-20 right-4 bg-green-600 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        <div class="flex items-center gap-2">
            <i class="fas fa-check-circle"></i>
            <span id="toast-msg">Success!</span>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mybymdcjytslxihbgqnh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15YnltZGNqeXRzbHhpaGJncW5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzOTYzMjMsImV4cCI6MjA5NTk3MjMyM30.5VBuL938TWC0cijFPPVdd1pG7_A1dFioQ5Bhv6SnLhs';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        let currentSymbol = 'XAUUSD';
        let currentLot = 0.5;
        let userBalance = 0;
        let tradingViewWidget = null;
        let currentPrice = 4178.46;
        let sellPrice = 4178.34;
        let buyPrice = 4178.58;

        // Initialize
        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = session.user;
            
            // Load user balance
            await loadBalance();
            
            initTradingView();
            startPriceUpdates();
        }

        async function loadBalance() {
            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('balance')
                .eq('id', currentUser.id)
                .single();
            
            if (profile) {
                userBalance = parseFloat(profile.balance) || 0;
                updateBalanceDisplay();
            }
        }

        function updateBalanceDisplay() {
            document.getElementById('balance').textContent = userBalance.toFixed(2);
            document.getElementById('account-balance').textContent = userBalance.toFixed(2);
        }

        function initTradingView() {
            tradingViewWidget = new TradingView.widget({
                autosize: true,
                symbol: currentSymbol,
                interval: "15",
                timezone: "Etc/UTC",
                theme: "dark",
                style: "1",
                locale: "en",
                toolbar_bg: "#1e222d",
                enable_publishing: false,
                allow_symbol_change: false,
                container_id: "tradingview_chart",
                hide_side_toolbar: false,
                details: true,
                hotlist: false,
                calendar: false,
                studies: [
                    "MASimple@tv-basicstudies",
                    "RSI@tv-basicstudies"
                ],
                show_popup_button: true,
                popup_width: "1000",
                popup_height: "650"
            });
        }

        function startPriceUpdates() {
            setInterval(() => {
                const change = (Math.random() - 0.5) * 0.5;
                currentPrice += change;
                const spread = 0.24;
                
                sellPrice = currentPrice - (spread / 2);
                buyPrice = currentPrice + (spread / 2);
                
                // Update prices
                document.getElementById('sellPrice').textContent = sellPrice.toFixed(2);
                document.getElementById('buyPrice').textContent = buyPrice.toFixed(2);
                document.getElementById('sellBtnPrice').textContent = sellPrice.toFixed(2);
                document.getElementById('buyBtnPrice').textContent = buyPrice.toFixed(2);
                document.getElementById('currentPrice').textContent = currentPrice.toFixed(2);
                
                // Update time
                const now = new Date();
                const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
                document.getElementById('priceTime').textContent = timeStr;
                
                // Calculate margin
                const margin = (currentPrice * currentLot) / 100;
                document.getElementById('margin').textContent = margin.toFixed(2);
                
            }, 1000);
        }

        function setLot(lot) {
            currentLot = lot;
            // Update UI
            document.querySelectorAll('.bg-slate-800.rounded').forEach(btn => {
                if (parseFloat(btn.textContent) === lot) {
                    btn.classList.remove('bg-slate-800');
                    btn.classList.add('bg-blue-600');
                } else {
                    btn.classList.remove('bg-blue-600');
                    btn.classList.add('bg-slate-800');
                }
            });
            
            // Recalculate margin
            const margin = (currentPrice * currentLot) / 100;
            document.getElementById('margin').textContent = margin.toFixed(2);
        }

        async function openTrade(type) {
            if (!currentUser) {
                showToast('Please log in to trade', true);
                return;
            }

            const price = type === 'SELL' ? sellPrice : buyPrice;
            
            const tradeData = {
                user_id: currentUser.id,
                type: type.toLowerCase(),
                symbol: currentSymbol,
                lot_size: currentLot,
                open_price: price,
                stop_loss: null,
                take_profit: null,
                status: 'open',
                opened_at: new Date().toISOString()
            };
            
            try {
                const { data, error } = await supabaseClient
                    .from('trades')
                    .insert([tradeData])
                    .select();

                if (error) throw error;

                showToast(`${type} order opened successfully! Lot: ${currentLot}`);
                
            } catch (error) {
                console.error('Trade error:', error);
                showToast('Failed to open trade. Please try again.', true);
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toast-msg');
            msgEl.textContent = message;
            
            if (isError) {
                toast.classList.remove('bg-green-600');
                toast.classList.add('bg-red-600');
            } else {
                toast.classList.remove('bg-red-600');
                toast.classList.add('bg-green-600');
            }

            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        }

        // Initialize on load
        init();
    </script>
</body>
</html>
