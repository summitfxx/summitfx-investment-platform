<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SummitFX Investment - Login</title>

<!-- FontAwesome for the eye icon (Optional but looks better) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Supabase JS Library (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b1220;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:#fff;
}

.container{
width:100%;
max-width:460px;
background:#151e2e;
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.4);
border:1px solid rgba(255,255,255,.05);
}

.logo{
text-align:center;
font-size:28px;
font-weight:800;
color:#f5a623;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#94a3b8;
margin-bottom:30px;
font-size:14px;
}

h2{
text-align:center;
margin-bottom:25px;
font-size:28px;
font-weight:700;
}

.input-group{
margin-bottom:15px;
}

input{
width:100%;
padding:14px 16px;
border:none;
border-radius:12px;
background:#0f172a;
color:#fff;
outline:none;
font-size:15px;
border:1px solid transparent;
transition:.3s;
}

input:focus{
border-color:#f5a623;
}

input::placeholder{
color:#64748b;
}

.password-wrapper{
position:relative;
}

.eye{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:18px;
user-select:none;
color: #94a3b8;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#f5a623;
color:#000;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:.3s;
margin-top:5px;
}

button:hover{
transform:translateY(-2px);
background: #d48b17;
}

.bottom-text{
text-align:center;
margin-top:20px;
color:#94a3b8;
font-size:14px;
}

.bottom-text a{
color:#f5a623;
text-decoration:none;
font-weight:600;
}

.bottom-text a:hover{
text-decoration:underline;
}

/* Loading state for button */
button:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    transform: none;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
SummitFX Investment
</div>

<div class="subtitle">
Access your investment dashboard
</div>

<h2>Welcome Back</h2>

<div class="input-group">
<input type="email" id="email" placeholder="Email Address">
</div>

<div class="input-group password-wrapper">
<input type="password" id="password" placeholder="Password">
<span class="eye" onclick="togglePassword()"><i class="fas fa-eye"></i></span>
</div>

<button id="login-btn" onclick="login()">
Login
</button>

<div class="bottom-text">
Don't have an account?
<a href="signup.html">Sign Up</a>
</div>

</div>

<!-- REGULAR SCRIPT (NOT MODULE) -->
<script>
    // --- SUPABASE CONFIGURATION (Matches your other pages) ---
    const SUPABASE_URL = 'https://mybymdcjytslxihbgqnh.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15YnltZGNqeXRzbHhpaGJncW5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzOTYzMjMsImV4cCI6MjA5NTk3MjMyM30.5VBuL938TWC0cijFPPVdd1pG7_A1dFioQ5Bhv6SnLhs';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    /* TOGGLE PASSWORD */
    function togglePassword() {
        const input = document.getElementById("password");
        const eyeIcon = document.querySelector(".eye i");

        if (input.type === "password") {
            input.type = "text";
            eyeIcon.classList.remove("fa-eye");
            eyeIcon.classList.add("fa-eye-slash");
        } else {
            input.type = "password";
            eyeIcon.classList.remove("fa-eye-slash");
            eyeIcon.classList.add("fa-eye");
        }
    }

    /* LOGIN FUNCTION */
    async function login() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn = document.getElementById("login-btn");

        if (!email || !password) {
            alert("Please fill in all fields");
            return;
        }

        // Show loading state
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

        const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password
        });

        if (error) {
            console.error("Login Error:", error);
            alert("Login Failed: " + error.message);
            
            // Reset button
            btn.disabled = false;
            btn.innerHTML = 'Login';
            return;
        }

        /* CONFIRM SESSION & REDIRECT */
        const { data: sessionData } = await supabaseClient.auth.getSession();

        if (sessionData.session) {
            // Success! Redirect to dashboard
            window.location.href = "dashboard.html";
        } else {
            alert("Login failed. Please try again.");
            btn.disabled = false;
            btn.innerHTML = 'Login';
        }
    }

    // Optional: Allow pressing "Enter" key to login
    document.getElementById("password").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            login();
        }
    });
</script>

</body>
</html>
