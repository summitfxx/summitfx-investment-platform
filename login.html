```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SummitFX Investment - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b1220;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:#fff;
}

.container{
width:100%;
max-width:460px;
background:#151e2e;
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.4);
border:1px solid rgba(255,255,255,.05);
}

.logo{
text-align:center;
font-size:28px;
font-weight:800;
color:#f5a623;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#94a3b8;
margin-bottom:30px;
font-size:14px;
}

h2{
text-align:center;
margin-bottom:25px;
font-size:28px;
font-weight:700;
}

.input-group{
margin-bottom:15px;
}

input{
width:100%;
padding:14px 16px;
border:none;
border-radius:12px;
background:#0f172a;
color:#fff;
outline:none;
font-size:15px;
border:1px solid transparent;
transition:.3s;
}

input:focus{
border-color:#f5a623;
}

input::placeholder{
color:#64748b;
}

.password-wrapper{
position:relative;
}

.eye{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:18px;
user-select:none;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#f5a623;
color:#000;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:.3s;
margin-top:5px;
}

button:hover{
transform:translateY(-2px);
}

.bottom-text{
text-align:center;
margin-top:20px;
color:#94a3b8;
font-size:14px;
}

.bottom-text a{
color:#f5a623;
text-decoration:none;
font-weight:600;
}

.bottom-text a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
SummitFX Investment
</div>

<div class="subtitle">
Access your investment dashboard
</div>

<h2>Welcome Back</h2>

<div class="input-group">
<input type="email" id="email" placeholder="Email Address">
</div>

<div class="input-group password-wrapper">
<input type="password" id="password" placeholder="Password">
<span class="eye" onclick="togglePassword()">👁</span>
</div>

<button onclick="login()">
Login
</button>

<div class="bottom-text">
Don't have an account?
<a href="signup.html">Sign Up</a>
</div>

</div>

<script type="module">
import { supabase } from "./js/supabase.js";

/* TOGGLE PASSWORD */
window.togglePassword = () => {
const input = document.getElementById("password");
const eye = document.querySelector(".eye");

if (input.type === "password") {
input.type = "text";
eye.textContent = "🙈";
} else {
input.type = "password";
eye.textContent = "👁";
}
};

/* LOGIN FUNCTION */
window.login = async () => {

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

if (!email || !password) {
alert("Please fill all fields");
return;
}

const { data, error } = await supabase.auth.signInWithPassword({
email,
password
});

if (error) {
alert(error.message);
return;
}

/* CONFIRM SESSION */
const { data: sessionData } = await supabase.auth.getSession();

if (sessionData.session) {
window.location.href = "dashboard.html";
} else {
alert("Login failed. Try again.");
}
};
</script>

</body>
</html>
