<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SummitFX - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b1220;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
width:380px;
background:#111827;
padding:30px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
text-align:center;
margin-bottom:20px;
color:#00c2ff;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
outline:none;
}

.password-wrapper{
position:relative;
}

.eye{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:14px;
color:#9ca3af;
user-select:none;
}

button{
width:100%;
padding:12px;
background:#2563eb;
border:none;
border-radius:10px;
color:white;
font-weight:600;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1d4ed8;
}

p{
text-align:center;
margin-top:15px;
font-size:14px;
color:#9ca3af;
}

a{
color:#00c2ff;
text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<h2>Login to SummitFX</h2>

<input type="email" id="email" placeholder="Email">

<!-- PASSWORD -->
<div class="password-wrapper">
<input type="password" id="password" placeholder="Password">
<span class="eye" onclick="togglePassword()">👁</span>
</div>

<button onclick="login()">Login</button>

<p>
Don't have an account?
<a href="signup.html">Sign Up</a>
</p>

</div>

<script type="module">
import { supabase } from "./js/supabase.js";

/* TOGGLE PASSWORD */
window.togglePassword = () => {
const input = document.getElementById("password");
const eye = document.querySelector(".eye");

if (input.type === "password") {
input.type = "text";
eye.textContent = "🙈";
} else {
input.type = "password";
eye.textContent = "👁";
}
};

/* LOGIN FUNCTION */
window.login = async () => {

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

if (!email || !password) {
alert("Please fill all fields");
return;
}

const { data, error } = await supabase.auth.signInWithPassword({
email,
password
});

if (error) {
alert(error.message);
return;
}

/* CONFIRM SESSION */
const { data: sessionData } = await supabase.auth.getSession();

if (sessionData.session) {
window.location.href = "dashboard.html";
} else {
alert("Login failed. Try again.");
}
};
</script>

</body>
</html>
