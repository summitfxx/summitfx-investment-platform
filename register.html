<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SummitFX - Sign Up</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b1220;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
padding:20px;
}

.container{
width:100%;
max-width:400px;
background:#111827;
padding:30px;
border-radius:15px;
}

h2{
text-align:center;
margin-bottom:20px;
color:#00c2ff;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
outline:none;
}

.password-box{
position:relative;
}

.eye{
position:absolute;
right:15px;
top:12px;
cursor:pointer;
}

button{
width:100%;
padding:12px;
background:#2563eb;
border:none;
border-radius:10px;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.message{
margin-top:15px;
text-align:center;
font-size:14px;
}

a{
color:#00c2ff;
text-decoration:none;
}
</style>
</head>
<body>

<div class="container">

<h2>Create Account</h2>

<input type="text" id="fullname" placeholder="Full Name">

<input type="email" id="email" placeholder="Email">

<div class="password-box">
<input type="password" id="password" placeholder="Password">
<span class="eye" onclick="togglePassword('password')">👁️</span>
</div>

<div class="password-box">
<input type="password" id="confirmPassword" placeholder="Confirm Password">
<span class="eye" onclick="togglePassword('confirmPassword')">👁️</span>
</div>

<button onclick="signup()">Sign Up</button>

<div class="message" id="message"></div>

<p style="text-align:center;margin-top:15px;">
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

<script type="module">

/* IMPORTANT:
   If supabase.js is in the root folder use:
*/
import { supabase } from "./supabase.js";

/*
If your file is inside a js folder use:
import { supabase } from "./js/supabase.js";
*/

window.togglePassword = (id) => {
const input = document.getElementById(id);
input.type = input.type === "password" ? "text" : "password";
};

window.signup = async () => {

const fullname = document.getElementById("fullname").value.trim();
const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;
const confirmPassword = document.getElementById("confirmPassword").value;
const message = document.getElementById("message");

message.innerHTML = "";

if (!fullname || !email || !password || !confirmPassword) {
message.innerHTML = "Please fill in all fields.";
return;
}

if (password !== confirmPassword) {
message.innerHTML = "Passwords do not match.";
return;
}

try {

const { data, error } = await supabase.auth.signUp({
email,
password
});

console.log("Signup Data:", data);
console.log("Signup Error:", error);

if (error) {
message.innerHTML = error.message;
return;
}

message.innerHTML = "Account created successfully.";

setTimeout(() => {
window.location.href = "login.html";
}, 1500);

} catch(err) {

console.error(err);
message.innerHTML =
"Unexpected error. Check browser console (F12).";

}

};

</script>

</body>
</html>
