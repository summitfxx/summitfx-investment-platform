<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SummitFX - Sign Up</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b1220;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
width:380px;
background:#111827;
padding:30px;
border-radius:16px;
}

h2{
text-align:center;
margin-bottom:20px;
color:#00c2ff;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
outline:none;
}

.password-wrapper{
position:relative;
}

.eye{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:14px;
color:#9ca3af;
}

button{
width:100%;
padding:12px;
background:#2563eb;
border:none;
border-radius:10px;
color:white;
font-weight:600;
cursor:pointer;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Create Account</h2>

<input type="text" id="fullname" placeholder="Full Name">
<input type="email" id="email" placeholder="Email">

<div class="password-wrapper">
<input type="password" id="password" placeholder="Password">
<span class="eye" onclick="toggle('password', this)">👁</span>
</div>

<div class="password-wrapper">
<input type="password" id="confirmPassword" placeholder="Confirm Password">
<span class="eye" onclick="toggle('confirmPassword', this)">👁</span>
</div>

<button onclick="signup()">Sign Up</button>

<p id="msg"></p>

</div>

<script type="module">
import { supabase } from "./js/supabase.js";

/* TOGGLE PASSWORD */
window.toggle = (id, el) => {
const input = document.getElementById(id);
input.type = input.type === "password" ? "text" : "password";
el.textContent = input.type === "password" ? "👁" : "🙈";
};

/* SIGNUP */
window.signup = async () => {

const fullname = document.getElementById("fullname").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
const confirmPassword = document.getElementById("confirmPassword").value;

const msg = document.getElementById("msg");

if (!fullname || !email || !password || !confirmPassword) {
msg.innerText = "Fill all fields";
return;
}

if (password !== confirmPassword) {
msg.innerText = "Passwords do not match";
return;
}

/* STEP 1: CREATE USER */
const { data, error } = await supabase.auth.signUp({
email,
password
});

if (error) {
msg.innerText = error.message;
return;
}

/* SAFE USER CHECK */
const user = data?.user || data?.session?.user;

if (!user) {
msg.innerText = "Check your email to confirm account";
return;
}

/* STEP 2: CREATE PROFILE */
await supabase.from("profiles").insert([
{
id: user.id,
full_name: fullname,
email: email,
balance: 0
}
]);

msg.innerText = "Account created successfully!";
setTimeout(() => {
window.location.href = "login.html";
}, 1500);

};
</script>

</body>
</html>
