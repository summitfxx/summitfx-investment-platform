<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SummitFX Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b1220;
color:white;
overflow-x:hidden;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:#0f172a;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-weight:700;
color:#00c2ff;
font-size:20px;
}

.menu-btn{
font-size:22px;
cursor:pointer;
}

/* MAIN */
.container{
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

.balance{
font-size:28px;
font-weight:700;
color:#00c2ff;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
}

.small-card{
background:#111827;
padding:15px;
border-radius:12px;
text-align:center;
}

/* RIGHT SIDEBAR */
.sidebar{
position:fixed;
top:0;
right:-280px;
width:280px;
height:100vh;
background:#0f172a;
padding:20px;
transition:0.3s;
z-index:2000;
}

.sidebar.active{
right:0;
}

.sidebar h3{
margin-bottom:20px;
color:#00c2ff;
}

.menu a{
display:block;
padding:12px;
margin:8px 0;
color:white;
text-decoration:none;
background:#111827;
border-radius:10px;
}

.menu a:hover{
background:#1f2937;
color:#00c2ff;
}

/* OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:1500;
}

.overlay.active{
display:block;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
<div class="logo">SummitFX</div>
<div class="menu-btn" onclick="openMenu()">☰</div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<h3>Menu</h3>

<div class="menu">
<a href="#">👤 My Profile</a>
<a href="#">💰 Deposit</a>
<a href="#">🏦 Withdraw</a>
<a href="#">🛡 KYC</a>
<a href="#">⚙ Settings</a>
<a href="#" onclick="logout()">🚪 Logout</a>
</div>

</div>

<!-- MAIN -->
<div class="container">

<div class="card">
<h2>Welcome Back</h2>
<p id="userEmail">Loading...</p>
</div>

<div class="card">
<h3>Balance</h3>
<div class="balance" id="balance">$0.00</div>
</div>

<div class="grid">

<div class="small-card">
<p>Active Plans</p>
<h3 id="plansCount">0</h3>
</div>

<div class="small-card">
<p>Profit</p>
<h3 id="profit">$0.00</h3>
</div>

<div class="small-card">
<p>KYC</p>
<h3 id="kycStatus">Pending</h3>
</div>

<div class="small-card">
<p>AI Bot</p>
<h3>Inactive</h3>
</div>

</div>

</div>

<script type="module">
import { supabase } from "./js/supabase.js";

/* ========================
   AUTH CHECK
======================== */
const { data: userData } = await supabase.auth.getUser();
const user = userData.user;

if (!user) {
window.location.href = "login.html";
}

/* ========================
   LOAD PROFILE
======================== */
async function loadProfile() {

const { data } = await supabase
.from("profiles")
.select("*")
.eq("id", user.id)
.single();

if (data) {
document.getElementById("userEmail").innerText = data.email;
document.getElementById("balance").innerText = "$" + (data.balance || 0);
}
}

/* ========================
   LOAD PLANS
======================== */
async function loadPlans() {

const { data } = await supabase
.from("plans")
.select("*")
.eq("user_id", user.id);

document.getElementById("plansCount").innerText =
data ? data.length : 0;
}

/* ========================
   LOAD KYC (optional field)
======================== */
async function loadKYC() {

const { data } = await supabase
.from("profiles")
.select("kyc_verified")
.eq("id", user.id)
.single();

if (data && data.kyc_verified) {
document.getElementById("kycStatus").innerText = "Verified";
} else {
document.getElementById("kycStatus").innerText = "Pending";
}
}

/* ========================
   MENU CONTROL
======================== */
window.openMenu = () => {
document.getElementById("sidebar").classList.add("active");
document.getElementById("overlay").classList.add("active");
};

window.closeMenu = () => {
document.getElementById("sidebar").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
};

/* ========================
   LOGOUT
======================== */
window.logout = async () => {
await supabase.auth.signOut();
window.location.href = "login.html";
};

/* ========================
   INIT
======================== */
loadProfile();
loadPlans();
loadKYC();
</script>

</body>
</html>
