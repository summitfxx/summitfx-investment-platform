<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw Funds - SummitFX</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-primary: #0b1220;
            --bg-secondary: #111827;
            --bg-card: #1e293b;
            --bg-card-hover: #263347;
            --border-color: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-gold: #f5a623;
            --accent-gold-hover: #d48b17;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-primary); display: flex; min-height: 100vh; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        /* --- Sidebar --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            position: fixed; height: 100vh;
            display: flex; flex-direction: column;
            padding: 24px 0; z-index: 100;
            transition: transform 0.3s ease;
        }
        .logo { padding: 0 24px 32px; font-size: 24px; font-weight: 800; border-bottom: 1px solid var(--border-color); margin-bottom: 24px; }
        .logo span { color: var(--accent-gold); }
        .nav-menu { flex: 1; padding: 0 16px; overflow-y: auto; }
        .nav-item {
            display: flex; align-items: center; gap: 16px;
            padding: 14px 16px; color: var(--text-secondary);
            text-decoration: none; border-radius: 8px;
            margin-bottom: 8px; transition: all 0.2s; font-weight: 500;
        }
        .nav-item:hover, .nav-item.active { background-color: rgba(245, 166, 35, 0.1); color: var(--accent-gold); }
        .nav-item.active { border-left: 3px solid var(--accent-gold); }
        .nav-item i { width: 20px; text-align: center; font-size: 18px; }
        .logout-btn {
            margin: 0 16px; padding: 14px;
            background: transparent; border: 1px solid var(--border-color);
            color: var(--text-secondary); border-radius: 8px;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
            gap: 10px; font-weight: 600;
        }
        .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

        /* --- Main Content --- */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1; padding: 32px;
            width: calc(100% - var(--sidebar-width));
        }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 32px;
        }
        .page-title h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
        .page-title p { color: var(--text-secondary); font-size: 15px; }

        /* --- Top-Right Dropdown --- */
        .user-menu-wrapper { position: relative; }
        .user-avatar-btn {
            width: 46px; height: 46px;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-hover));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: var(--bg-primary); font-weight: 700; font-size: 18px;
            cursor: pointer; border: 2px solid transparent;
            transition: all 0.25s ease; box-shadow: 0 4px 12px rgba(245, 166, 35, 0.25);
        }
        .user-avatar-btn:hover, .user-avatar-btn.active {
            transform: scale(1.05); border-color: var(--accent-gold);
            box-shadow: 0 6px 18px rgba(245, 166, 35, 0.4);
        }
        .dropdown-menu {
            position: absolute; top: calc(100% + 12px); right: 0;
            width: 240px; background: var(--bg-card);
            border: 1px solid var(--border-color); border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); padding: 8px;
            opacity: 0; visibility: hidden; transform: translateY(-10px);
            transition: all 0.25s ease; z-index: 200;
        }
        .dropdown-menu.show { opacity: 1; visibility: visible; transform: translateY(0); }
        .dropdown-menu::before {
            content: ''; position: absolute; top: -7px; right: 16px;
            width: 12px; height: 12px; background: var(--bg-card);
            border-left: 1px solid var(--border-color); border-top: 1px solid var(--border-color);
            transform: rotate(45deg);
        }
        .dropdown-header { padding: 12px 14px; border-bottom: 1px solid var(--border-color); margin-bottom: 6px; }
        .dropdown-header .greeting { font-size: 13px; color: var(--text-secondary); }
        .dropdown-header .email { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-top: 2px; word-break: break-all; }
        .dropdown-item {
            display: flex; align-items: center; gap: 12px; padding: 11px 14px;
            color: var(--text-secondary); text-decoration: none; border-radius: 8px;
            font-size: 14px; font-weight: 500; transition: all 0.2s ease;
            cursor: pointer; border: none; background: transparent; width: 100%; text-align: left;
        }
        .dropdown-item:hover { background: rgba(245, 166, 35, 0.1); color: var(--accent-gold); }
        .dropdown-item i { width: 18px; text-align: center; font-size: 15px; }
        .dropdown-divider { height: 1px; background: var(--border-color); margin: 6px 0; }
        .dropdown-item.danger:hover { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        /* --- Withdrawal Flow --- */
        .withdraw-container { max-width: 800px; margin: 0 auto; }

        .balance-card {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-card-hover));
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
        }
        .balance-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--accent-gold), transparent);
        }
        .balance-label { font-size: 14px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .balance-amount { font-size: 42px; font-weight: 800; color: var(--text-primary); margin-bottom: 8px; }
        .balance-amount span { color: var(--accent-gold); }
        .balance-note { font-size: 13px; color: var(--text-secondary); }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title i { color: var(--accent-gold); }

        /* Crypto Grid */
        .crypto-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .crypto-card {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 12px;
        }

        .crypto-card:hover {
            border-color: var(--accent-gold);
            transform: translateY(-2px);
        }

        .crypto-card.selected {
            border-color: var(--accent-gold);
            background: rgba(245, 166, 35, 0.05);
            box-shadow: 0 0 0 1px var(--accent-gold), 0 8px 20px rgba(245, 166, 35, 0.15);
        }

        .crypto-icon {
            width: 48px; height: 48px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .crypto-icon.btc { background: rgba(247, 147, 26, 0.15); color: #f7931a; }
        .crypto-icon.eth { background: rgba(98, 126, 234, 0.15); color: #627eea; }
        .crypto-icon.usdt-trc { background: rgba(38, 161, 123, 0.15); color: #26a17b; }
        .crypto-icon.usdt-erc { background: rgba(38, 161, 123, 0.15); color: #26a17b; }

        .crypto-info h4 { font-size: 15px; font-weight: 700; }
        .crypto-info .network {
            font-size: 11px;
            color: var(--text-secondary);
            background: var(--bg-secondary);
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 4px;
        }
        .crypto-info .fee {
            font-size: 12px;
            color: var(--warning);
            margin-top: 6px;
            font-weight: 600;
        }

        /* Withdrawal Form */
        .withdraw-form {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            display: none;
            animation: slideUp 0.4s ease;
        }
        .withdraw-form.show { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group { margin-bottom: 24px; position: relative; }
        .form-group label { 
            display: flex; justify-content: space-between;
            font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; 
        }
        .max-btn {
            color: var(--accent-gold);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .max-btn:hover { text-decoration: underline; }

        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: var(--text-secondary);
            font-size: 18px;
        }
        .form-group input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .form-group input:focus { 
            outline: none; 
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.1);
        }
        .form-group input.error {
            border-color: var(--danger);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }
        .error-msg {
            color: var(--danger);
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }
        .error-msg.show { display: block; }

        /* Summary Box */
        .summary-box {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .summary-row.total {
            border-top: 1px dashed var(--border-color);
            margin-top: 8px;
            padding-top: 16px;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .summary-row.total .value { color: var(--success); font-size: 20px; }

        .warning-box {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 10px;
            padding: 16px;
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .warning-box i { color: var(--warning); font-size: 20px; margin-top: 2px; }
        .warning-box p { font-size: 13px; color: var(--text-primary); line-height: 1.5; }

        .btn-withdraw {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-hover));
            color: var(--bg-primary);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-withdraw:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(245, 166, 35, 0.3);
        }
        .btn-withdraw:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* --- Confirmation Modal --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%;
