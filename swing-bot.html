<script>

/* SUPABASE */
const SUPABASE_URL = 'https://mybymdcjytslxihbgqnh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15YnltZGNqeXRzbHhpaGJncW5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzOTYzMjMsImV4cCI6MjA5NTk3MjMyM30.5VBuL938TWC0cijFPPVdd1pG7_A1dFioQ5Bhv6SnLhs';

const { createClient } = supabase;
const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* BOT CONFIGURATION */
const MIN_BALANCE = 100;
const STOP_BALANCE = 10;
const MAX_PROFIT_24H = 15000;
const PROFIT_PER_SECOND = MAX_PROFIT_24H / (24 * 60 * 60); // Exactly 0.17361111 per second

/* BOT DATA */
let balance = 0;
let totalProfit = 0;
let livePL = 0;
let activeTrades = 0;
let running = false;
let botActivatedAt = null;
let botTotalEarned = 0;
let lastTransactionTime = 0;

/* ELEMENTS */
const balanceEl = document.getElementById('balance');
const livePLEl = document.getElementById('livePL');
const totalProfitEl = document.getElementById('totalProfit');
const activeTradesEl = document.getElementById('activeTrades');
const statusEl = document.getElementById('botStatus');
const tradeLog = document.getElementById('tradeLog');
const startBtn = document.getElementById('startBtn');
const fundModal = document.getElementById('fundModal');
const modalBalance = document.getElementById('modalBalance');

/* LOAD USER ACCOUNT (Only runs ONCE on page load) */
async function loadBalance(){
    try{
        const { data:{ session } } = await client.auth.getSession();
        
        if(!session){
            balanceEl.innerText = "$0.00";
            return;
        }
        
        const user = session.user;
        const { data } = await client
            .from('profiles')
            .select('*')
            .eq('id', user.id)
            .maybeSingle();
        
        if(data){
            balance = Number(data.balance || 0);
            totalProfit = Number(data.total_profit || 0);
            botActivatedAt = data.bot_activated_at ? new Date(data.bot_activated_at) : null;
            botTotalEarned = Number(data.bot_total_earned || 0);
            
            if(data.bot_status === 'running' && botActivatedAt){
                calculateOfflineProfit(); // Catch up ONCE
                running = true;
                statusEl.innerText = 'RUNNING';
                statusEl.className = 'status running';
                startBtn.disabled = true;
                startBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> RUNNING...';
            }
        }
        
        updateUI();
        updateStartButton();
    }
    catch(err){
        console.log(err);
    }
}

/* CALCULATE OFFLINE PROFIT (Only runs ONCE on page load) */
function calculateOfflineProfit(){
    if(!botActivatedAt || !running) return;
    
    const now = new Date();
    const elapsedSeconds = (now - botActivatedAt) / 1000;
    
    // Cap at 24 hours
    const cappedSeconds = Math.min(elapsedSeconds, 86400);
    const profitEarned = cappedSeconds * PROFIT_PER_SECOND;
    
    // Only add what hasn't been added yet
    const newProfit = profitEarned - botTotalEarned;
    
    if(newProfit > 0.01){
        balance += newProfit;
        totalProfit += newProfit;
        botTotalEarned = profitEarned;
        livePL = newProfit;
        
        saveBalance();
        saveBotState();
    }
}

/* UPDATE START BUTTON STATE */
function updateStartButton(){
    if(balance < MIN_BALANCE){
        startBtn.disabled = true;
        startBtn.innerHTML = '<i class="fas fa-lock"></i> INSUFFICIENT FUNDS';
    } else {
        startBtn.disabled = false;
        startBtn.innerHTML = '<i class="fas fa-play"></i> START BOT';
    }
}

/* BINANCE STYLE CHART */
const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');

function resizeCanvas(){
    canvas.width = canvas.offsetWidth;
    canvas.height = 320;
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let candles = [];
let currentPrice = 100;

for(let i = 0; i < 45; i++){
    let open = currentPrice;
    let close = open + (Math.random() - 0.5) * 12;
    let high = Math.max(open, close) + Math.random() * 6;
    let low = Math.min(open, close) - Math.random() * 6;
    
    candles.push({ open, close, high, low });
    currentPrice = close;
}

function drawChart(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    
    for(let i = 0; i < 6; i++){
        let y = (canvas.height / 6) * i;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }
    
    let highs = candles.map(c => c.high);
    let lows = candles.map(c => c.low);
    let maxPrice = Math.max(...highs);
    let minPrice = Math.min(...lows);
    let padding = 20;
    let chartHeight = canvas.height - padding * 2;
    let candleWidth = canvas.width / candles.length;
    
    candles.forEach((candle, i) => {
        let x = i * candleWidth + candleWidth / 2;
        
        let openY = padding + ((maxPrice - candle.open) / (maxPrice - minPrice)) * chartHeight;
        let closeY = padding + ((maxPrice - candle.close) / (maxPrice - minPrice)) * chartHeight;
        let highY = padding + ((maxPrice - candle.high) / (maxPrice - minPrice)) * chartHeight;
        let lowY = padding + ((maxPrice - candle.low) / (maxPrice - minPrice)) * chartHeight;
        
        let bullish = candle.close > candle.open;
        let color = bullish ? '#10b981' : '#ef4444';
        
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.moveTo(x, highY);
        ctx.lineTo(x, lowY);
        ctx.stroke();
        
        let bodyTop = Math.min(openY, closeY);
        let bodyHeight = Math.abs(openY - closeY);
        
        if(bodyHeight < 4){
            bodyHeight = 4;
        }
        
        ctx.fillStyle = color;
        ctx.fillRect(
            x - candleWidth * 0.25,
            bodyTop,
            candleWidth * 0.5,
            bodyHeight
        );
    });
}

function updateCandles(){
    if(!running) return;
    
    let lastClose = candles[candles.length - 1].close;
    let open = lastClose;
    let move = (Math.random() - 0.48) * 14;
    let close = open + move;
    let high = Math.max(open, close) + Math.random() * 5;
    let low = Math.min(open, close) - Math.random() * 5;
    
    candles.push({ open, close, high, low });
    
    if(candles.length > 45){
        candles.shift();
    }
    
    drawChart();
}

/* UPDATE UI */
function updateUI(){
    balanceEl.innerText = '$' + balance.toFixed(2);
    
    totalProfitEl.innerText = (totalProfit >= 0 ? '+' : '-') + '$' + Math.abs(totalProfit).toFixed(2);
    livePLEl.innerText = (livePL >= 0 ? '+' : '-') + '$' + Math.abs(livePL).toFixed(2);
    
    livePLEl.className = 'stat-value ' + (livePL >= 0 ? 'green' : 'red');
    totalProfitEl.className = 'stat-value ' + (totalProfit >= 0 ? 'green' : 'red');
    
    activeTradesEl.innerText = activeTrades;
}

/* TRADE LOG */
function addTradeLog(profit){
    const div = document.createElement('div');
    div.className = 'log-item';
    
    const pairList = ['XAUUSD', 'BTCUSD', 'EURUSD', 'GBPUSD', 'ETHUSD'];
    const pair = pairList[Math.floor(Math.random() * pairList.length)];
    const type = Math.random() > 0.5 ? 'BUY' : 'SELL';
    const typeClass = type === 'BUY' ? 'buy' : 'sell';
    
    div.innerHTML = `
        <div class="log-pair">
            <span class="log-type ${typeClass}">${type}</span>
            <span>${pair}</span>
        </div>
        <span class="log-profit" style="color:${profit >= 0 ? '#10b981' : '#ef4444'};">
            ${profit >= 0 ? '+' : '-'}$${Math.abs(profit).toFixed(2)}
        </span>
    `;
    
    tradeLog.prepend(div);
    
    if(tradeLog.children.length > 10){
        tradeLog.removeChild(tradeLog.lastChild);
    }
}

/* SAVE BALANCE */
async function saveBalance(){
    const { data:{ session } } = await client.auth.getSession();
    if(!session) return;
    
    try {
        await client
            .from('profiles')
            .update({ 
                balance: balance,
                total_profit: totalProfit
            })
            .eq('id', session.user.id);
    } catch(err) {
        console.error('Save balance error:', err);
    }
}

/* CREATE PROFIT TRANSACTION */
async function createProfitTransaction(amount){
    const { data:{ session } } = await client.auth.getSession();
    if(!session) return;
    
    try {
        await client
            .from('transactions')
            .insert({
                user_id: session.user.id,
                type: 'profit',
                amount: amount,
                description: 'Swing Master Bot Profit',
                status: 'completed'
            });
    } catch(err) {
        console.error('Create transaction error:', err);
    }
}

/* SAVE BOT STATE */
async function saveBotState(){
    const { data:{ session } } = await client.auth.getSession();
    if(!session) return;
    
    try {
        await client
            .from('profiles')
            .update({ 
                bot_activated_at: botActivatedAt ? botActivatedAt.toISOString() : null,
                bot_total_earned: botTotalEarned,
                bot_status: running ? 'running' : 'stopped'
            })
            .eq('id', session.user.id);
    } catch(err) {
        console.error('Save bot state error:', err);
    }
}

/* BOT ENGINE - TIME BASED (The ONLY place profit is added while running) */
function botLoop(){
    if(!running) return;
    
    // STOP if we've reached the 24-hour cap
    if(botTotalEarned >= MAX_PROFIT_24H) {
        // 24 hour cycle complete
        botActivatedAt = new Date();
        botTotalEarned = 0;
        saveBotState();
        addTradeLog(0);
        const div = document.createElement('div');
        div.className = 'log-item';
        div.style.borderColor = '#f5a623';
        div.innerHTML = `
            <div class="log-pair" style="color:#f5a623;">
                <i class="fas fa-sync-alt"></i>
                <span>24h Cycle Complete</span>
            </div>
            <span style="color:#f5a623; font-weight:700;">$15,000 Profit Earned!</span>
        `;
        tradeLog.prepend(div);
        updateUI();
        return;
    }
    
    if(balance < STOP_BALANCE){
        stopBot();
        addTradeLog(0);
        const div = document.createElement('div');
        div.className = 'log-item';
        div.style.borderColor = '#ef4444';
        div.innerHTML = `
            <div class="log-pair" style="color:#ef4444;">
                <i class="fas fa-exclamation-triangle"></i>
                <span>Bot Auto-Stopped</span>
            </div>
            <span style="color:#ef4444; font-weight:700;">Insufficient Funds</span>
        `;
        tradeLog.prepend(div);
        return;
    }
    
    // Add EXACTLY 3 seconds worth of profit
    const profitThisInterval = 3 * PROFIT_PER_SECOND; // Exactly 0.52083333
    
    // Check if adding this would exceed the cap
    const remainingProfit = MAX_PROFIT_24H - botTotalEarned;
    const actualProfit = Math.min(profitThisInterval, remainingProfit);
    
    if(actualProfit <= 0) return;
    
    balance += actualProfit;
    totalProfit += actualProfit;
    botTotalEarned += actualProfit;
    livePL = actualProfit;
    activeTrades = Math.floor(Math.random() * 4) + 1;
    
    updateCandles();
    updateUI();
    addTradeLog(actualProfit);
    
    const nowMs = Date.now();
    if(nowMs - lastTransactionTime > 30000) {
        createProfitTransaction(actualProfit * 10);
        lastTransactionTime = nowMs;
    }
    
    saveBalance();
    saveBotState();
}

/* START BOT */
function startBot(){
    if(balance < MIN_BALANCE){
        showFundModal();
        return;
    }
    
    running = true;
    botActivatedAt = new Date();
    botTotalEarned = 0;
    lastTransactionTime = Date.now();
    
    statusEl.innerText = 'RUNNING';
    statusEl.className = 'status running';
    startBtn.disabled = true;
    startBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> RUNNING...';
    
    saveBotState();
}

/* PAUSE */
function pauseBot(){
    running = false;
    statusEl.innerText = 'PAUSED';
    statusEl.className = 'status paused';
    startBtn.disabled = false;
    startBtn.innerHTML = '<i class="fas fa-play"></i> START BOT';
    
    saveBotState();
}

/* STOP */
function stopBot(){
    running = false;
    botActivatedAt = null;
    botTotalEarned = 0;
    
    statusEl.innerText = 'STOPPED';
    statusEl.className = 'status stopped';
    livePL = 0;
    activeTrades = 0;
    updateUI();
    updateStartButton();
    
    saveBotState();
}

/* FUND MODAL FUNCTIONS */
function showFundModal(){
    modalBalance.innerText = '$' + balance.toFixed(2);
    fundModal.classList.add('show');
}

function closeFundModal(){
    fundModal.classList.remove('show');
}

function goToDeposit(){
    closeFundModal();
    window.location.href = 'deposit.html';
}

fundModal.addEventListener('click', (e) => {
    if(e.target === fundModal){
        closeFundModal();
    }
});

/* INITIALIZE */
drawChart();
updateUI();
loadBalance(); // Loads ONCE and catches up on offline profit

// ONLY run botLoop every 3 seconds - NO OTHER INTERVALS!
setInterval(botLoop, 3000);

</script>
