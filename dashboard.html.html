<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SummitFX Investment Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0b1220;color:#fff}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:18px 30px;background:#111827;border-bottom:1px solid rgba(255,255,255,.05)}
.logo{font-size:24px;font-weight:800;color:#f5a623}
.nav{display:flex;gap:25px}.nav a{text-decoration:none;color:#94a3b8}.nav a.active,.nav a:hover{color:#fff}
.menu-btn{cursor:pointer;font-size:24px}
.container{max-width:1400px;margin:auto;padding:25px}
.hero{background:linear-gradient(135deg,#f5a623,#d18b0d);padding:30px;border-radius:22px;color:#000;margin-bottom:20px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-bottom:20px}
.card{background:#151e2e;padding:22px;border-radius:18px}
.value{font-size:28px;font-weight:700}
.chart{background:#151e2e;padding:25px;border-radius:18px;height:320px;display:flex;align-items:center;justify-content:center;color:#64748b;margin-bottom:20px}
.quick{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px}
.qcard{background:#151e2e;padding:20px;border-radius:16px;text-align:center}
.sidebar{position:fixed;top:0;right:-320px;width:320px;height:100vh;background:#111827;padding:20px;transition:.3s}
.sidebar.active{right:0}
.sidebar a{display:block;text-decoration:none;color:#fff;background:#151e2e;padding:14px;border-radius:12px;margin-bottom:10px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6)}
.overlay.active{display:block}
</style>
</head>
<body>
<div class="topbar">
<div class="logo">SummitFX Investment</div>
<div class="nav"><a class="active" href="#">Portfolio</a><a href="#">Trade</a><a href="#">History</a></div>
<div class="menu-btn" onclick="openMenu()">☰</div>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>
<div class="sidebar" id="sidebar">
<h3 style="color:#f5a623;margin-bottom:15px">Menu</h3>
<a href="#">👤 Profile</a>
<a href="#">💰 Deposit</a>
<a href="#">🏦 Withdraw</a>
<a href="#">📈 Investments</a>
<a href="#">🛡 KYC</a>
<a href="#" onclick="logout()">🚪 Logout</a>
</div>

<div class="container">
<div class="hero">
<h2 id="balance">$0.00</h2>
<p>Total Portfolio Value</p>
</div>

<div class="cards">
<div class="card"><div>Total Profit</div><div class="value" id="profit">$0.00</div></div>
<div class="card"><div>Active Plans</div><div class="value" id="plansCount">0</div></div>
<div class="card"><div>KYC Status</div><div class="value" id="kycStatus">Pending</div></div>
</div>

<div class="chart">Portfolio Growth Chart Area</div>

<div class="quick">
<div class="qcard"><h4>Email</h4><div id="userEmail">Loading...</div></div>
<div class="qcard"><h4>Deposits</h4><div>$0</div></div>
<div class="qcard"><h4>Withdrawals</h4><div>$0</div></div>
<div class="qcard"><h4>Referrals</h4><div>0</div></div>
</div>
</div>

<script type="module">
import { supabase } from "./js/supabase.js";

const { data:userData } = await supabase.auth.getUser();
const user = userData.user;
if(!user){ window.location.href="login.html"; }

window.openMenu=()=>{
document.getElementById('sidebar').classList.add('active');
document.getElementById('overlay').classList.add('active');
}
window.closeMenu=()=>{
document.getElementById('sidebar').classList.remove('active');
document.getElementById('overlay').classList.remove('active');
}

async function loadProfile(){
const {data} = await supabase.from('profiles').select('*').eq('id',user.id).single();
if(data){
document.getElementById('userEmail').innerText=data.email || user.email;
document.getElementById('balance').innerText='$'+(data.balance||0);
document.getElementById('profit').innerText='$'+(data.profit||0);
}
}

async function loadPlans(){
const {data}=await supabase.from('plans').select('*').eq('user_id',user.id);
document.getElementById('plansCount').innerText=data?data.length:0;
}

async function loadKYC(){
const {data}=await supabase.from('profiles').select('kyc_verified').eq('id',user.id).single();
document.getElementById('kycStatus').innerText=(data&&data.kyc_verified)?'Verified':'Pending';
}

window.logout=async()=>{
await supabase.auth.signOut();
window.location.href='login.html';
}

loadProfile();
loadPlans();
loadKYC();
</script>
</body>
</html>
